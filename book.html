<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Registration Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      background:#fff;
      padding:30px;
      width:400px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .container h2{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .form-group{
      margin-bottom:15px;
    }

    .form-group label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
      color:#555;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:14px;
    }

    .form-group textarea{
      resize:none;
      height:80px;
    }

    .btn{
      width:100%;
      padding:12px;
      background:#007BFF;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#0056b3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Book Registration Form</h2>

    <form>
      <div class="form-group">
        <label for="bookname">Book Name</label>
        <input type="text" id="bookname" placeholder="Enter book name" required>
      </div>

      <div class="form-group">
        <label for="author">Author Name</label>
        <input type="text" id="author" placeholder="Enter author name" required>
      </div>

      <div class="form-group">
        <label for="isbn">ISBN Number</label>
        <input type="text" id="isbn" placeholder="Enter ISBN number" required>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option>Science</option>
          <option>Technology</option>
          <option>Literature</option>
          <option>Education</option>
          <option>History</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Write book details..."></textarea>
      </div>

      <button type="submit" class="btn">Register Book</button>
    </form>
  </div>

</body>
</html>
